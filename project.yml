name: Pickaboo
options:
  bundleIdPrefix: com.hoooon97
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Pickaboo:
    type: application
    platform: macOS
    sources:
      - path: Sources
    info:
      path: Resources/Info.plist
      properties:
        LSUIElement: true
        CFBundleName: Pickaboo
        CFBundleDisplayName: Pickaboo
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSHumanReadableCopyright: ""
        NSRemindersUsageDescription: "Pickaboo reads your Reminders to surface upcoming tasks."
        NSRemindersFullAccessUsageDescription: "Pickaboo reads your Reminders to surface upcoming tasks in the menu bar."
        NSCalendarsUsageDescription: "Pickaboo reads your Reminders to surface upcoming tasks."
        NSLocationWhenInUseUsageDescription: "Pickaboo uses your location to fetch current weather."
        NSLocationUsageDescription: "Pickaboo uses your location to fetch current weather."
        NSAppleEventsUsageDescription: "Pickaboo uses Accessibility to detect the active window so it can stay out of your way."
    entitlements:
      path: Resources/Pickaboo.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hoooon97.pickaboo
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
